<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LIBERO-90 per-task distribution</title>
<style>
  :root{ --plotH:240px; }
  body{font-family:BlinkMacSystemFont,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:#2b2b2b;background:#ffffff;margin:0;padding:30px 24px 90px;}
  .page{max-width:1080px;margin:0 auto;}
  h1{font-size:21px;font-weight:normal;color:#333;margin:0 0 4px;}
  p.sub{font-size:13px;color:#777;margin:0 0 26px;}
  .hint{color:#9a8ab5;font-style:italic;}
  .chart{margin:8px 0 40px;}
  .chart h2{font-size:15px;color:#3a3a3a;margin:0 0 2px;font-weight:bold;}
  .chart h2 .ov{color:#888;font-weight:normal;font-size:13px;margin-left:8px;}
  .plot{position:relative;display:flex;align-items:flex-end;height:var(--plotH);
        border-left:1.4px solid #cfcfcf;border-bottom:1.4px solid #cfcfcf;
        padding-left:2px;gap:1px;margin-left:34px;}
  /* y gridlines + labels via the axis layer */
  .yaxis{position:absolute;left:-34px;top:0;bottom:0;width:34px;pointer-events:none;}
  .yaxis .gl{position:absolute;left:34px;right:0;border-top:1px dashed #ececec;}
  .yaxis .yl{position:absolute;right:36px;transform:translateY(-50%);font-size:10px;color:#999;}
  .col{position:relative;flex:1 1 0;height:100%;min-width:5px;cursor:pointer;}
  .col .fill{position:absolute;bottom:0;left:0;right:0;border-radius:2px 2px 0 0;
             transition:filter .12s;}
  .col:hover .fill{filter:brightness(1.12) saturate(1.2);outline:1px solid rgba(0,0,0,.35);outline-offset:-1px;}
  .col .whisker{position:absolute;left:50%;width:1.4px;transform:translateX(-50%);background:#5a5a5a;opacity:.55;}
  .col .whisker::before,.col .whisker::after{content:"";position:absolute;left:-2px;width:5px;height:1.4px;background:#5a5a5a;}
  .col .whisker::before{top:0;} .col .whisker::after{bottom:0;}

  /* hover popup */
  #tip{position:fixed;z-index:50;width:268px;background:#fff;border:1px solid #e2dcef;border-radius:10px;
       box-shadow:0 8px 28px rgba(40,20,80,.18);padding:10px 12px 12px;pointer-events:none;
       opacity:0;transition:opacity .1s;}
  #tip.on{opacity:1;}
  #tip .scene{font-size:10.5px;letter-spacing:.5px;font-weight:bold;color:#6D588B;text-transform:uppercase;}
  #tip .instr{font-size:13.5px;color:#222;line-height:1.3;margin:1px 0 6px;}
  #tip .val{font-size:12px;color:#555;margin-bottom:8px;}
  #tip .val b{color:#222;}
  #tip video{width:100%;height:auto;display:block;border-radius:6px;background:#000;aspect-ratio:1/1;object-fit:cover;}
  #tip .novid{font-size:11px;color:#aa6;}
  /* when embedded in index.html via <iframe>, drop the page title (the section already has one) */
  body.embed{padding:6px 8px 12px 30px;}
  body.embed > .page > h1, body.embed > .page > p.sub{display:none;}
</style>
</head>
<body>
<div class="page">
  <h1>LIBERO-90 &mdash; per-task success</h1>
  <p class="sub">Each bar is one of the 90 tasks, sorted by success rate (mean &plusmn; std&nbsp;err over 3 seeds).
     <span class="hint">Hover a bar to see the task and play its rollout.</span></p>
  <div class="chart" id="chart-lmp"></div>
  <div class="chart" id="chart-dp"></div>
</div>

<div id="tip">
  <div class="scene"></div>
  <div class="instr"></div>
  <div class="val"></div>
  <video muted loop playsinline preload="none"></video>
</div>

<script>
const VIDDIR="./static/videos/libero_rollouts/";
const MODELS=[
  {id:"chart-lmp", json:"./static/libero_per_task_lmp.json", title:"LMP-&pi;", overall:"0.933 ± 0.003"},
  {id:"chart-dp",  json:"./static/libero_per_task_dp.json",  title:"Diffusion Policy", overall:"0.909 ± 0.004"},
];
// RdYlGn-style colormap (low = red, high = green)
function color(t){
  const s=[[0,[200,52,42]],[0.25,[244,128,72]],[0.5,[252,214,128]],[0.75,[150,200,96]],[1,[26,140,72]]];
  t=Math.max(0,Math.min(1,t));
  for(let i=1;i<s.length;i++){ if(t<=s[i][0]){ const a=s[i-1],b=s[i],f=(t-a[0])/(b[0]-a[0]);
    const c=a[1].map((v,j)=>Math.round(v+f*(b[1][j]-v))); return `rgb(${c[0]},${c[1]},${c[2]})`; } }
  return "rgb(26,140,72)";
}
function fmt(name){
  const m=name.match(/^([A-Z_]*SCENE\d+)_(.*)$/);
  return m ? {scene:m[1].replace(/_/g," "), instr:m[2].replace(/_/g," ")}
           : {scene:"", instr:name.replace(/_/g," ")};
}
const tip=document.getElementById("tip");
const tScene=tip.querySelector(".scene"), tInstr=tip.querySelector(".instr"),
      tVal=tip.querySelector(".val"), tVid=tip.querySelector("video");
let hideT=null;
function showTip(task,s,e){
  const f=fmt(task);
  tScene.textContent=f.scene; tInstr.textContent=f.instr;
  tVal.innerHTML=`success <b>${s.toFixed(2)}</b> &plusmn; ${e.toFixed(2)}`;
  tVid.src=VIDDIR+encodeURIComponent(task)+".mp4";
  tVid.load(); tVid.play().catch(()=>{});
  tip.classList.add("on");
}
function hideTip(){ tip.classList.remove("on"); tVid.pause(); tVid.removeAttribute("src"); tVid.load(); }
function moveTip(x,y){
  const w=tip.offsetWidth||268, h=tip.offsetHeight||300, pad=14;
  let nx=x+16, ny=y+16;
  if(nx+w+pad>innerWidth) nx=x-w-16;
  if(ny+h+pad>innerHeight) ny=Math.max(pad,innerHeight-h-pad);
  tip.style.left=nx+"px"; tip.style.top=ny+"px";
}

function buildChart(cfg, data){
  const wrap=document.getElementById(cfg.id);
  const entries=Object.entries(data).sort((a,b)=>a[1].success-b[1].success);
  // header
  const h2=document.createElement("h2");
  h2.innerHTML=`${cfg.title}<span class="ov">overall ${cfg.overall} &middot; ${entries.length} tasks</span>`;
  wrap.appendChild(h2);
  // plot
  const plot=document.createElement("div"); plot.className="plot";
  const yax=document.createElement("div"); yax.className="yaxis";
  for(let v=0;v<=1.0001;v+=0.2){ const pct=(v*100).toFixed(0);
    yax.insertAdjacentHTML("beforeend",
      `<div class="gl" style="bottom:${v*100}%"></div><div class="yl" style="bottom:${v*100}%">${v.toFixed(1)}</div>`);
  }
  plot.appendChild(yax);
  for(const [task,o] of entries){
    const col=document.createElement("div"); col.className="col";
    const s=o.success, e=o.stderr||0;
    const lo=Math.max(0,s-e), hi=Math.min(1,s+e);
    col.innerHTML=
      `<div class="fill" style="height:${s*100}%;background:${color(s)}"></div>`+
      (e>0?`<div class="whisker" style="bottom:${lo*100}%;height:${(hi-lo)*100}%"></div>`:``);
    col.addEventListener("mouseenter",()=>{ if(hideT)clearTimeout(hideT); showTip(task,s,e); });
    col.addEventListener("mousemove",ev=>moveTip(ev.clientX,ev.clientY));
    col.addEventListener("mouseleave",()=>{ hideT=setTimeout(hideTip,80); });
    plot.appendChild(col);
  }
  wrap.appendChild(plot);
}

Promise.all(MODELS.map(m=>fetch(m.json).then(r=>r.json()).then(d=>buildChart(m,d))))
  .then(()=>{
    if(window.self!==window.top){                  // embedded in index.html
      document.body.classList.add("embed");
      const post=()=>parent.postMessage({type:"lmp-libero-height",h:document.body.scrollHeight},"*");
      post(); window.addEventListener("load",post);
      if(window.ResizeObserver) new ResizeObserver(post).observe(document.body);
    }
  })
  .catch(err=>{ document.querySelector(".page").insertAdjacentHTML("beforeend",
     `<p style="color:#b00">Failed to load data: ${err}. Serve via http (not file://).</p>`); });
</script>
</body>
</html>
