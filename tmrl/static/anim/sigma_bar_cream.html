<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TMRL — &sigma; bar (cream)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;1,9..144,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  /* ── CREAM tokens (for #F3EBDE slide background) ──────────────
     bg #F3EBDE · track(dim) #D8CFBF · active #1D9E75
     endpoint dots #5F5E5A · numerals/labels #1F1B16 · text #1F1B16@85% · mono JetBrains */
  :root{
    --bg0:#F3EBDE; --bg1:#EDE3D4;
    --track:#D8CFBF; --accent:#1D9E75; --dot:#5F5E5A;
    --num:#1F1B16; --txt:rgba(31,27,22,0.85);
    --mono:'JetBrains Mono',monospace;
  }
  html,body{margin:0;padding:0;height:100%;}
  *{box-sizing:border-box;}
  body{
    background:linear-gradient(180deg,var(--bg0) 0%,var(--bg1) 100%);
    color:var(--num); font-family:var(--mono);
    overflow:hidden; display:flex; align-items:center; justify-content:center;
  }
  /* fixed 1280x720 design space, scaled to fill viewport (crisp: vector widget + text) */
  .fit{ position:relative; width:1280px; height:720px; transform-origin:center center; }
  .stage{
    position:absolute; inset:0; display:flex; align-items:center; gap:64px; padding:0 72px;
  }

  /* ── left: same robot rollout, same framing ── */
  .left{ width:520px; flex:none; }
  .frame-box{
    position:relative; border:1px solid rgba(31,27,22,0.16); border-radius:14px;
    overflow:hidden; background:#000; line-height:0; box-shadow:0 18px 40px rgba(31,27,22,0.20);
    width:520px; height:441px;
  }
  .frame-box img{
    position:absolute; inset:0; width:520px; height:441px; object-fit:cover; display:block;
  }
  .instr{
    text-align:center; font-family:'Fraunces',serif; font-style:italic; font-size:21px;
    color:rgba(31,27,22,0.72); margin:20px 4px 0; line-height:1.36;
  }

  /* ── right: ONE horizontal sigma bar ── */
  .right{ flex:1; min-width:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  #bar{ width:580px; height:auto; display:block; overflow:visible; }
  .barnum{ font-family:var(--mono); fill:var(--num); }
  .bartxt{ font-family:var(--mono); fill:var(--txt); }

  /* phase label row under the bar — small */
  .phases{
    margin-top:22px; display:flex; gap:30px; font-family:var(--mono);
    font-size:15px; letter-spacing:0.20em; text-transform:uppercase;
  }
  .phases span{ color:rgba(31,27,22,0.34); transition:color .25s ease; }
  .phases span.on{ color:var(--accent); font-weight:700; }
</style>
</head>
<body>
<div class="fit" id="fit">
  <div class="stage">
    <div class="left">
      <div class="frame-box">
        <img id="rob0" src="" alt="">
        <img id="rob1" src="" alt="" style="opacity:0">
      </div>
      <div class="instr">&ldquo;pick up the shrimp and put it into the white drawer&rdquo;</div>
    </div>
    <div class="right">
      <svg id="bar" viewBox="0 0 560 250" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="phases">
        <span data-ph="reach">reach</span>
        <span data-ph="pick">pick</span>
        <span data-ph="place">place</span>
      </div>
    </div>
  </div>
</div>

/* ── exact timeline constants reused from render.js ── */
var FPS = 30, INTRO_F = 18, RAMP_F = 23, HOLD_F = 14, OUTRO_F = 48, WRAP_F = 20;
function easeInOutCubic(x){ return x < 0.5 ? 4*x*x*x : 1 - Math.pow(-2*x+2,3)/2; }

/* phase definitions reused from frame.html */
var PHASES = [
  {key:'reach', start:0,   end:2.5},
  {key:'pick',  start:2.5, end:5.5},
  {key:'place', start:5.5, end:N-1}
];
function phaseAt(t){ for(var i=0;i<PHASES.length;i++){ if(t < PHASES[i].end) return PHASES[i].key; } return 'place'; }

/* per-output-frame timeline: intro hold → eased chunk ramps → outro hold → seamless wrap */
function buildTimeline(){
  var tl = [];
  for(var i=0;i<INTRO_F;i++) tl.push({t:0});
  for(var c=0;c<N-1;c++){
    for(var j=1;j<=RAMP_F;j++) tl.push({t:c+easeInOutCubic(j/RAMP_F)});
    if(c<N-2) for(var k=0;k<HOLD_F;k++) tl.push({t:c+1});
  }
  for(var o=0;o<OUTRO_F;o++) tl.push({t:N-1});
  /* wrap: crossfade frame 9 → 0 and ease sigma 0.36 → 0.01 so the loop is seamless */
  for(var w=1;w<=WRAP_F;w++) tl.push({wrap:easeInOutCubic(w/WRAP_F)});
  return tl;
}
var TIMELINE = buildTimeline();
var TOTAL = TIMELINE.length;

/* ── bar geometry: horizontal track, sigma=0 left, sigma=T right ── */
var X0=80, X1=480, BY=150, READY_Y=78;       // track endpoints + baseline of readout
function lerp(a,b,f){ return a+(b-a)*f; }
function xFor(sig){ return X0 + Math.max(0,Math.min(1,sig))*(X1-X0); }

/* static bar: dim track + endpoint dots + end labels + readout — built once */
function buildBar(){
  var svg = document.getElementById('bar');
  var h = '';
  h += '<defs>'
     + '<filter id="glow" x="-80%" y="-80%" width="260%" height="260%">'
     + '<feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>'
     + '</defs>';
  /* dim full track */
  h += '<line x1="'+X0+'" y1="'+BY+'" x2="'+X1+'" y2="'+BY+'" stroke="var(--track)" stroke-width="14" stroke-linecap="round"/>';
  /* endpoint dots */
  h += '<circle cx="'+X0+'" cy="'+BY+'" r="5.5" fill="var(--dot)"/>';
  h += '<circle cx="'+X1+'" cy="'+BY+'" r="5.5" fill="var(--dot)"/>';
  /* active fill + marker — dynamic group */
  h += '<g id="dyn"></g>';
  /* centered readout above the bar */
  h += '<text id="sigval" class="barnum" x="'+((X0+X1)/2)+'" y="'+READY_Y+'" font-size="58" font-weight="700" text-anchor="middle" style="font-variant-numeric:tabular-nums">&sigma; = 0.01</text>';
  /* end labels under the bar */
  h += '<text class="bartxt" x="'+X0+'" y="'+(BY+34)+'" font-size="14" text-anchor="middle" letter-spacing="0.04em">conditional</text>';
  h += '<text class="bartxt" x="'+X0+'" y="'+(BY+52)+'" font-size="12" text-anchor="middle" fill-opacity="0.6">precise</text>';
  h += '<text class="bartxt" x="'+X1+'" y="'+(BY+34)+'" font-size="14" text-anchor="middle" letter-spacing="0.04em">marginal</text>';
  h += '<text class="bartxt" x="'+X1+'" y="'+(BY+52)+'" font-size="12" text-anchor="middle" fill-opacity="0.6">broad</text>';
  svg.insertAdjacentHTML('beforeend', h);
}

function setRobot(idx, overSrc, overOp){
  var r0=document.getElementById('rob0'), r1=document.getElementById('rob1');
  var s0=FRAMES[idx];
  if(r0.getAttribute('src')!==s0) r0.setAttribute('src',s0);
  if(overSrc){ if(r1.getAttribute('src')!==overSrc) r1.setAttribute('src',overSrc); r1.style.opacity=overOp; }
  else r1.style.opacity=0;
}

function drawBar(sig){
  sig = Math.max(0, Math.min(1, sig));
  var xm = xFor(sig);
  var h='';
  /* filled segment from conditional end up to the marker */
  h += '<line x1="'+X0+'" y1="'+BY+'" x2="'+xm.toFixed(2)+'" y2="'+BY+'" stroke="var(--accent)" stroke-width="14" stroke-linecap="round" filter="url(#glow)"/>';
  /* glowing marker / handle */
  h += '<circle cx="'+xm.toFixed(2)+'" cy="'+BY+'" r="13" fill="var(--accent)" filter="url(#glow)"/>';
  document.getElementById('dyn').innerHTML = h;
  document.getElementById('sigval').innerHTML = '&sigma; = '+sig.toFixed(2);
}

function setPhase(key){
  var els=document.querySelectorAll('.phases span');
  for(var i=0;i<els.length;i++) els[i].classList.toggle('on', els[i].getAttribute('data-ph')===key);
}

function renderFrame(idx){
  var f = TIMELINE[idx];
  if(f.wrap!==undefined){
    var e=f.wrap;
    drawBar(lerp(COND_T[N-1], COND_T[0], e));
    setRobot(N-1, FRAMES[0], e);                 // crossfade frame 9 -> 0
    setPhase(e<0.5 ? 'place' : 'reach');
  } else {
    var t=Math.max(0,Math.min(N-1,f.t));
    var lo=Math.floor(t), hi=Math.min(N-1,lo+1);
    drawBar(lerp(COND_T[lo], COND_T[hi], t-lo));
    setRobot(Math.round(t), null, 0);
    setPhase(phaseAt(t));
  }
}

/* ── fit 1280x720 design space into the viewport ── */
function fit(){
  var s=Math.min(window.innerWidth/1280, window.innerHeight/720);
  document.getElementById('fit').style.transform='scale('+s+')';
}
window.addEventListener('resize', fit); fit();

buildBar();

/* capture mode: ?frame=N renders one frame deterministically and flags ready */
function qp(n){ var m=location.search.match(new RegExp('[?&]'+n+'=([-0-9.]+)')); return m?m[1]:null; }
window.__total = TOTAL;
window.__renderFrame = renderFrame;
window.__ready = false;
function ready(){ window.__ready=true; document.body.setAttribute('data-ready','1'); }

var fp = qp('frame');
if(fp!==null){
  renderFrame(Math.max(0,Math.min(TOTAL-1,parseInt(fp,10))));
  Promise.all([
    document.fonts?document.fonts.ready:Promise.resolve(),
    new Promise(function(res){ var im=document.getElementById('rob0'); if(im.complete&&im.naturalWidth>0)return res(); im.onload=im.onerror=res; })
  ]).then(function(){ requestAnimationFrame(function(){ requestAnimationFrame(ready); }); });
} else {
  /* live playback @30fps, time-driven, seamless loop */
  renderFrame(0);
  var start=null, last=-1;
  function tick(ts){
    if(start===null) start=ts;
    var idx=Math.floor((ts-start)/(1000/FPS)) % TOTAL;
    if(idx!==last){ renderFrame(idx); last=idx; }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}
</script>
</body>
</html>
